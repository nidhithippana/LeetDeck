<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <title>LeetDeck — Spaced-repetition LeetCode practice</title>
    <meta
      name="description"
      content="Anki × NeetCode. A handful of new problems and reviews each day, scheduled with spaced repetition so the patterns actually stick."
    />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LeetDeck — Spaced-repetition LeetCode practice" />
    <meta
      property="og:description"
      content="Daily LeetCode patterns that actually stick. Solve in JavaScript, Python, or TypeScript."
    />
    <meta name="twitter:card" content="summary" />

    <!-- Inline SVG favicon: stacked cards with => arrow -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23282c34'/%3E%3Crect x='9' y='12' width='18' height='13' rx='2.25' fill='%233a3f4a'/%3E%3Crect x='5' y='7' width='18' height='13' rx='2.25' fill='%231f2329' stroke='rgba(255,255,255,0.1)' stroke-width='0.6'/%3E%3Cg stroke='%2339ff7f' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round' fill='none'%3E%3Cline x1='8.5' y1='12' x2='14.5' y2='12'/%3E%3Cline x1='8.5' y1='15.5' x2='14.5' y2='15.5'/%3E%3Cpolyline points='15,9.5 19.5,13.75 15,18'/%3E%3C/g%3E%3C/svg%3E"
    />
    <!-- Apply theme class before React mounts to avoid flash of wrong theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('leetdeck.theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
